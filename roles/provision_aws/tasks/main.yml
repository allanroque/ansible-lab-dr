---
# ============================================================================
# Role: provision_aws
# Uses community.general.terraform to apply the Terraform plan
# ============================================================================

- name: Ensure Terraform project directory exists
  ansible.builtin.stat:
    path: "{{ terraform_project_dir }}"
  register: tf_dir

- name: Fail if Terraform project directory is missing
  ansible.builtin.fail:
    msg: >-
      Terraform project directory not found at {{ terraform_project_dir }}.
      Please verify the path is correct.
  when: not tf_dir.stat.exists

- name: Initialize and apply Terraform plan
  community.general.terraform:
    project_path: "{{ terraform_project_dir }}"
    state: present
    force_init: true
    binary_path: "{{ terraform_binary | default(omit) }}"
    backend_config:
      bucket: "{{ s3_backend_bucket }}"
      key: "{{ s3_backend_key }}"
      region: "{{ s3_backend_region }}"
      dynamodb_table: "{{ dynamodb_lock_table }}"
      encrypt: "true"
    variables:
      aws_region: "{{ aws_region }}"
      aws_name_tag: "{{ aws_name_tag }}"
      aws_instance_size: "{{ aws_instance_size }}"
      aws_instance_count: "{{ aws_instance_count | string }}"
      aws_instance_name: "{{ aws_instance_name }}"
      aws_instance_public_key: "{{ aws_instance_public_key }}"
  register: terraform_result

- name: Display Terraform outputs
  ansible.builtin.debug:
    var: terraform_result.outputs

- name: Set fact with instance public IPs
  ansible.builtin.set_fact:
    provisioned_ips: "{{ terraform_result.outputs.instance_public_ips.value }}"
    provisioned_ids: "{{ terraform_result.outputs.instance_ids.value }}"

- name: Display provisioned instance IPs
  ansible.builtin.debug:
    msg: "Provisioned {{ provisioned_ips | length }} RHEL instances: {{ provisioned_ips | join(', ') }}"

- name: Add provisioned hosts to in-memory inventory
  ansible.builtin.add_host:
    name: "{{ item }}"
    groups: provisioned_servers
    ansible_user: ec2-user
    ansible_ssh_private_key_file: "{{ ansible_ssh_private_key_file | default('~/.ssh/id_ed25519') }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
  loop: "{{ provisioned_ips }}"

- name: Wait for SSH to become available on new instances
  ansible.builtin.wait_for:
    host: "{{ item }}"
    port: 22
    delay: 10
    timeout: 300
    state: started
  loop: "{{ provisioned_ips }}"
