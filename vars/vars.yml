---
# ============================================================================
# AWS / Terraform variables
# ============================================================================

aws_region: us-east-2
aws_name_tag: ansible
aws_instance_size: t2.micro
aws_instance_count: 3
aws_instance_name: server
aws_instance_public_key:

# ============================================================================
# Terraform configuration
# ============================================================================

terraform_project_dir: "{{ playbook_dir }}/terraform"
terraform_state_dir: "{{ terraform_project_dir }}"
terraform_binary: terraform

# ============================================================================
# S3 Backend for Terraform remote state
# ============================================================================

s3_backend_bucket: "terraform-state-{{ aws_name_tag }}"
s3_backend_key: "ansible-lab-dr/terraform.tfstate"
s3_backend_region: "{{ aws_region }}"
dynamodb_lock_table: "terraform-lock-{{ aws_name_tag }}"

# ============================================================================
# Application - 3 tier (Database / Backend / Frontend)
# ============================================================================

db_name: appdb
db_user: appuser
db_password: AppP@ss2024
db_port: 5432
app_port: 3000
backend_port: 3000
