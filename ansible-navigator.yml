---
ansible-navigator:
  ansible:
    config:
      path: ./ansible.cfg 
    inventory:
      entries:
      - ./inventory
  execution-environment:
    container-engine: podman
    enabled: true
    image: quay.io/allanroque/ee-terraform:latest
    #image: quay.io/acme_corp/aws_ee:latest
    #image: registry.redhat.io/ansible-automation-platform-24/ee-supported-rhel8
    #image: quay.io/acme_corp/servicenow-ee:latest
    #image: quay.io/ansible-middleware/ansible-middleware-ee:latest
    pull:
      policy: missing
  enable-prompts: True
  
#  logging:
#    level: critical  # Define o nível para crítico (quase nenhum log)
#    append: false
#    file: /dev/null

  playbook-artifact:
    enable: false

  mode: stdout
#  playbook-artifact:
#    save-as: .logs/{playbook_name}-artifact-{time_stamp}.json

  time-zone: America/Sao_Paulo
